# Eval-time racing config

# =============================================================================
# Eval specific parameters
# =============================================================================

env:
  seed: 67                # overridden by eval_racing.py --seeds / --seed
  episode_length_s: 20    # affects max_steps cap and DNF penalty time
  sim_dt: 0.01
  decimation: 5

terrain:                  # primary lever for eval difficulty
  env_num_rows: 50
  env_num_cols: 50
  row_spacing: 0.25
  col_spacing: 0.25
  color_sampling: false
  car_width_m: 0.28
  difficulty_range: [.4, .9]
  phase_boundary: 0.0
  track_width_cells: 5
  steps_per_segment: 40
  margin_frac: 0.1

goals:
  loop_dist_frac_range: [0.95, 0.95]   # EVAL-DIFF: was [0.1, 0.95]; narrower window so loop attempts are comparable
  off_track_wheel_threshold: 1
  goal_reached_eps_m: 0.35

events:                   # physical randomization at robot spawn
  wheel_friction:
    static_friction_range:  [0.4, 0.6]
    dynamic_friction_range: [0.4, 0.6]
    restitution_range:      [0.0, 0.0]
    num_buckets: 10
    make_consistent: false
  base_mass_range:  [1.0, 3.0]
  wheel_mass_range: [0.01, 0.3]
  spawn_yaw_offset_deg_range: [0,0]

observations:
  enable_corruption: false             # EVAL-DIFF: was true; disabled so metric reflects policy capability, not noise tolerance
  concatenate_terms: true
  base_lin_vel_noise: [-0.1, 0.1]
  base_ang_vel_noise: [-0.1, 0.1]
  last_action_noise:  [-0.1, 0.1]
  last_action_clip:   [-1.0, 1.0]

logging:                  # eval_racing.py reads no_wandb / wandb_project / wandb_group from here
  no_wandb: false                      # set true to disable wandb at eval
  wandb_project: "WheeledLab"
  wandb_group: "eval"
  # --- training-only keys below: unused at eval, but required because importing
  #     wheeledlab_rl.configs builds RSS_RACING_CONFIG at import time, which reads
  #     every one of these from logging: (see rss_cfgs.py). Keep the section complete. ---
  video: false
  video_length: 500
  video_interval: 15000
  video_resolution: [1280, 720]
  video_crf: 30
  log_every: 10
  checkpoint_every: 1000
  no_checkpoints: false
  no_log: false
  test_mode: false
  log_policy_camera: false
  policy_camera_sensor_name: "camera"
  policy_camera_env_id: 0
  policy_camera_fps: 5

# =============================================================================
# None of these matter for evals
# =============================================================================

run: 
  num_envs: 128 #override by seed average flag
  num_iterations: 3000

ppo: # pulls from checkpoint
  num_steps_per_env: 128
  max_iterations: 4000
  save_interval: 50
  experiment_name: "eval_only"
  empirical_normalization: false
  algorithm:
    value_loss_coef: 3.0
    use_clipped_value_loss: true
    clip_param: 0.2
    entropy_coef: 0.01
    num_learning_epochs: 4
    num_mini_batches: 2
    learning_rate: 5.0e-4
    schedule: "adaptive"
    gamma: 0.99
    lam: 0.95
    desired_kl: 0.01
    max_grad_norm: 1.0

policy:                  
  class_name: "ActorCriticCNN"
  init_noise_std: 1
  activation: "relu"
  actor_hidden_dims: [64, 64]
  critic_hidden_dims: [64, 64]
  image_shape: [1, 40, 80]
  cnn_channels: [8, 16]
  cnn_kernel_sizes: [5, 3]
  cnn_strides: [2, 2]
  cnn_out_dim: 32
  rnn_type: "gru"
  rnn_hidden_dim: 128
  rnn_num_layers: 1

rewards: 
  progress_rew_weight: 1.0
  time_step_pen_weight: -0.01
  off_track_pen_weight: -0.5
  goal_reached_rew_weight: 15.0
  out_of_tile_pen_weight: -50.0